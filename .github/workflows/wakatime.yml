name: Waka Readme

on:
  schedule:
    # Cứ mỗi 3 tiếng hệ thống sẽ tự chạy để cập nhật thời gian code của bạn
    - cron: '0 */3 * * *'
  workflow_dispatch: # Giúp bạn có thể nhấn nút chạy thử thủ công luôn

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TITLE: true
          SECTION_NAME: wakatime
